on: [push]

jobs:
  generate_pdf_job:
    runs-on: ubuntu-latest
    name: A job to generate a pdf
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Render CV step
        uses: ./
        id: render

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendercv-pdf
          path: rendercv_output/Damien_Hodsall_CV.pdf 

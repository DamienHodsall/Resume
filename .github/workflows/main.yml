on: [push]

jobs:
  generate_pdf_job:
    runs-on: ubuntu-latest
    name: A job to generate a pdf
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: pip install --no-cache-dir rendercv[full]

      - name: Render CV
        run: rendercv render Damien_Hodsall_CV.yaml

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rendercv-pdf
          path: rendercv_output/Damien_Hodsall_CV.pdf
